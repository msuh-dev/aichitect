<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded indigo background -->
  <rect width="32" height="32" rx="7" fill="#6366f1"/>
  <!-- Monitor icon (white), scaled and centred -->
  <g transform="translate(5.5, 5)" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Screen body -->
    <rect x="1" y="2" width="19" height="11" rx="1.2"/>
    <!-- Stand legs -->
    <polyline points="8.75,13 8,16 7,17"/>
    <polyline points="12.25,13 13,16 14,17"/>
    <!-- Foot bar -->
    <line x1="6" y1="17" x2="15" y2="17"/>
    <!-- Horizontal shelf line on screen -->
    <line x1="1" y1="10" x2="20" y2="10"/>
  </g>
</svg>
